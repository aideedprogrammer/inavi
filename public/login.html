<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - I-Navigator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #070f1f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    /* Animated background */
    .bg-layer {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(13,59,110,0.55) 0%, transparent 65%),
        radial-gradient(ellipse 70% 50% at 80% 70%, rgba(26,47,90,0.5) 0%, transparent 60%),
        linear-gradient(160deg, #050d1a 0%, #0a1628 50%, #0d1f3a 100%);
      z-index: 0;
    }

    /* Subtle grid overlay */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    /* Glowing orb decorations */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      pointer-events: none;
    }
    .orb-1 {
      width: 400px; height: 400px;
      background: rgba(13,59,110,0.35);
      top: -120px; left: -100px;
    }
    .orb-2 {
      width: 300px; height: 300px;
      background: rgba(201,168,76,0.08);
      bottom: -80px; right: -80px;
    }

    /* Card */
    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 16px;
    }

    .login-card {
      background: rgba(12, 22, 44, 0.82);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 16px;
      padding: 40px 36px 36px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 24px 60px rgba(0,0,0,0.6),
        0 0 40px rgba(13,59,110,0.3);
      backdrop-filter: blur(12px);
    }

    /* Brand */
    .brand-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid rgba(201,168,76,0.5);
      background: rgba(201,168,76,0.08);
      margin-bottom: 16px;
      box-shadow: 0 0 20px rgba(201,168,76,0.15);
    }

    .brand-logo-wrap img {
      width: 52px;
      height: 52px;
      object-fit: contain;
      border-radius: 50%;
    }

    .brand-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 2.5px;
      color: #ffffff;
      text-transform: uppercase;
    }

    .brand-subtitle {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2.5px;
      color: #c9a84c;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .brand-divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #c9a84c, transparent);
      margin: 14px auto 0;
    }

    /* Form */
    .form-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: rgba(201,168,76,0.8);
      margin-bottom: 6px;
    }

    .form-control {
      background: rgba(255,255,255,0.05) !important;
      border: 1px solid rgba(255,255,255,0.12) !important;
      border-radius: 8px !important;
      color: #e8e8e8 !important;
      font-size: 14px;
      padding: 10px 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-control::placeholder {
      color: rgba(255,255,255,0.2);
    }

    .form-control:focus {
      background: rgba(255,255,255,0.08) !important;
      border-color: rgba(201,168,76,0.55) !important;
      box-shadow: 0 0 0 3px rgba(201,168,76,0.12) !important;
      color: #ffffff !important;
      outline: none;
    }

    .input-icon-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.2);
      font-size: 14px;
      pointer-events: none;
    }

    .input-icon-wrap .form-control {
      padding-right: 36px;
    }

    /* Login button */
    .btn-login {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #b8922a 0%, #c9a84c 50%, #d4b96a 100%);
      border: none;
      border-radius: 8px;
      color: #0a1628;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(201,168,76,0.3);
      margin-top: 8px;
    }

    .btn-login:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(201,168,76,0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Footer note */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 10px;
      letter-spacing: 0.8px;
      color: rgba(255,255,255,0.18);
      text-transform: uppercase;
    }

    /* Toast */
    #toastMsg {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: none;
      border-radius: 8px;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div class="bg-layer"></div>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="login-wrap">
    <div class="login-card">

      <div class="brand-section">
        <div class="brand-logo-wrap">
          <img src="./upnm.png" alt="UPNM Logo">
        </div>
        <div class="brand-title">I-Navigator</div>
        <div class="brand-subtitle">Naval Passage Planning System</div>
        <div class="brand-divider"></div>
      </div>

      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <div class="input-icon-wrap">
            <input type="text" class="form-control" name="username" placeholder="Enter your username" required autocomplete="username">
            <span class="input-icon">&#9998;</span>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-icon-wrap">
            <input type="password" class="form-control" name="password" placeholder="Enter your password" required autocomplete="current-password">
            <span class="input-icon">&#128274;</span>
          </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
      </form>

      <div class="login-footer">
        Universiti Pertahanan Nasional Malaysia &nbsp;&bull;&nbsp; Secure Access
      </div>

    </div>
  </div>

<!-- Toast -->
<div class="toast align-items-center text-bg-danger" id="toastMsg" role="alert" aria-live="assertive" aria-atomic="true">
  <div class="d-flex">
    <div class="toast-body" id="toastText">
      Invalid login credentials.
    </div>
    <button type="button" class="btn-close btn-close-white me-2 m-auto" onclick="hideToast()"></button>
  </div>
</div>

<script>
  const loginForm = document.getElementById('loginForm');
  const loginBtn = document.getElementById('loginBtn');

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginBtn.disabled = true;
    loginBtn.textContent = 'Signing in...';

    const formData = new FormData(loginForm);
    const data = {
      username: formData.get('username'),
      password: formData.get('password')
    };

    const res = await fetch('/login_auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    const result = await res.json();
    if (result.success) {
      window.location.href = result.redirect;
    } else {
      showToast(result.message || "Login failed");
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign In';
    }
  });

  function showToast(msg) {
    const toast = document.getElementById('toastMsg');
    const toastText = document.getElementById('toastText');
    toastText.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 3000);
  }

  function hideToast() {
    document.getElementById('toastMsg').style.display = 'none';
  }
</script>
</body>
</html>
